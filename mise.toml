[tools]
go = "1.26.4"
lefthook = "2.1.9"
golangci-lint = "2.12.2"

[env]
CGO_ENABLED = "0"
GOCACHE = "{{env.HOME}}/.cache/go-build"

[tasks.build]
run = "go build -ldflags='-s -w' -o bin/lazyjira ./cmd/lazyjira/"

[tasks.start]
run = "./bin/lazyjira"

[tasks.fmt]
run = "gofmt -w ."
description = "Format Go files"

[tasks.tidy]
run = "go mod tidy"
description = "Tidy Go modules"

[tasks.vet]
run = "go vet ./..."
description = "Run go vet"

[tasks.test]
run = "go test ./..."
description = "Run tests"

[tasks.lint]
run = "golangci-lint run"
description = "Run golangci-lint"

[tasks.check]
run = [
  "mise run tidy",
  "mise run fmt",
  "mise run vet",
  "mise run lint",
  "mise run test",
]
description = "Run all local checks"

[tasks.clean]
run = "rm -rf tmp bin"
description = "Remove build artifacts"
