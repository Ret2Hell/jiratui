[tools]
go = "1.26.4"
lefthook = "2.1.9"
golangci-lint = "2.12.2"
goreleaser = "2.16"
syft = "1.38.0"

[env]
CGO_ENABLED = "0"
GOCACHE = "{{env.HOME}}/.cache/go-build"

[tasks.build]
run = "VERSION=$(tr -d '[:space:]' < version); COMMIT=$(git rev-parse --short=12 HEAD); DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ'); go build -ldflags=\"-s -w -X github.com/Ret2Hell/jiratui/internal/version.Version=$VERSION -X github.com/Ret2Hell/jiratui/internal/version.Commit=$COMMIT -X github.com/Ret2Hell/jiratui/internal/version.Date=$DATE\" -o bin/jiratui ./cmd/jiratui/"

[tasks.start]
run = "./bin/jiratui"

[tasks.release-snapshot]
run = "goreleaser release --snapshot --clean"
description = "Build a local GoReleaser snapshot into dist/"

[tasks.fmt]
run = "gofmt -w ."
description = "Format Go files"

[tasks.tidy]
run = "go mod tidy"
description = "Tidy Go modules"

[tasks.vet]
run = "go vet ./..."
description = "Run go vet"

[tasks.test]
run = "go test ./..."
description = "Run tests"

[tasks.lint]
run = "golangci-lint run"
description = "Run golangci-lint"

[tasks.check]
run = [
  "mise run tidy",
  "mise run fmt",
  "mise run vet",
  "mise run lint",
  "mise run test",
]
description = "Run all local checks"

[tasks.clean]
run = "rm -rf tmp bin"
description = "Remove build artifacts"
