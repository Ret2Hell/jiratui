name: Setup Go

description: Set up the Go toolchain used by this repository.

inputs:
  cache:
    description: Whether to enable the setup-go module cache.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version-file: go.mod
        cache: ${{ inputs.cache }}
