name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  GORELEASER_VERSION: v2.16.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          version: v2.12.2

  goreleaser:
    name: GoReleaser Check
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-go

      - name: Install GoReleaser
        run: |
          go install "github.com/goreleaser/goreleaser/v2@${GORELEASER_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: GoReleaser check
        run: goreleaser check .goreleaser.yaml

      - name: GoReleaser smoke build
        env:
          GOOS: linux
          GOARCH: amd64
        run: goreleaser build --snapshot --clean --single-target

  prepare-release-tag:
    name: Check release tag
    needs: [test, lint, goreleaser]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      should_create: ${{ steps.prepare.outputs.should_create }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Determine whether a release tag is needed
        id: prepare
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          release_tag="$(scripts/read-version.sh tag)"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

          version_changed=true
          if [[ -n "$BEFORE_SHA" && ! "$BEFORE_SHA" =~ ^0+$ ]]; then
            git fetch --no-tags origin "$BEFORE_SHA" --depth=1 || true
            if git rev-parse --verify "$BEFORE_SHA" >/dev/null 2>&1; then
              if git diff --quiet "$BEFORE_SHA" HEAD -- version; then
                version_changed=false
              fi
            fi
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            if git diff --quiet HEAD^ HEAD -- version; then
              version_changed=false
            fi
          fi

          if [[ "$version_changed" != true ]]; then
            echo "version did not change in the CI head commit; skipping tag creation"
            echo "should_create=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --tags origin "+refs/tags/${release_tag}:refs/tags/${release_tag}" || true
          if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "${release_tag}")"
            current_commit="$(git rev-parse HEAD)"
            if [[ "$tagged_commit" != "$current_commit" ]]; then
              echo "Tag ${release_tag} already exists on a different commit" >&2
              exit 1
            fi
            echo "Tag ${release_tag} already exists on this commit; nothing to do"
            echo "should_create=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_create=true" >> "$GITHUB_OUTPUT"

  create-release-tag:
    name: Create release tag
    needs: prepare-release-tag
    if: needs.prepare-release-tag.outputs.should_create == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate release token
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          test -n "$RELEASE_TOKEN" || {
            echo "Missing RELEASE_TOKEN secret." >&2
            echo "A PAT or GitHub App token is required because tags pushed with GITHUB_TOKEN do not trigger workflows." >&2
            exit 1
          }

      - name: Create release tag
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release-tag.outputs.release_tag }}
        run: |
          authenticated_remote="https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --tags "$authenticated_remote"

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
            current_commit="$(git rev-parse HEAD)"
            if [[ "$tagged_commit" != "$current_commit" ]]; then
              echo "Tag ${RELEASE_TAG} already exists on a different commit" >&2
              exit 1
            fi
            echo "Tag ${RELEASE_TAG} already exists on this commit; nothing to do"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "${RELEASE_TAG}"
          git push "$authenticated_remote" "refs/tags/${RELEASE_TAG}"
