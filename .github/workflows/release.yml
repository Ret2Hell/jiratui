name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  GORELEASER_VERSION: v2.16.0
  SYFT_VERSION: v1.38.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-go

      - name: Validate release tag
        run: |
          version="$(scripts/read-version.sh)"
          expected_tag="$(scripts/read-version.sh tag)"
          echo "Version file: $version"
          echo "Expected tag: $expected_tag"
          echo "Current ref type: ${GITHUB_REF_TYPE}"
          echo "Current ref name: ${GITHUB_REF_NAME}"

          if [[ "${GITHUB_REF_NAME}" != "$expected_tag" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match version file $version" >&2
            exit 1
          fi

      - name: Install release tools
        run: |
          go install "github.com/goreleaser/goreleaser/v2@${GORELEASER_VERSION}"
          mkdir -p "${HOME}/.local/bin"
          syft_archive="$(mktemp)"
          curl -sSfL "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${SYFT_VERSION#v}_linux_amd64.tar.gz" -o "$syft_archive"
          tar -xzf "$syft_archive" -C "${HOME}/.local/bin" syft
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Generate release notes
        run: |
          mkdir -p tmp
          scripts/release-notes.sh "${GITHUB_REF_NAME}" > tmp/RELEASE_NOTES.md
          cat tmp/RELEASE_NOTES.md

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --clean --release-notes tmp/RELEASE_NOTES.md
